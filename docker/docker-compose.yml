services:
	postgres:
		image: postgres:16
		container_name: studioos-postgres
		environment:
			POSTGRES_USER: studio
			POSTGRES_PASSWORD: studio
			POSTGRES_DB: studioos
		ports:
			- "5432:5432"
		volumes:
			- postgres_data:/var/lib/postgresql/data
		healthcheck:
			test: ["CMD-SHELL", "pg_isready -U studio -d studioos"]
			interval: 5s
			timeout: 5s
			retries: 10

	granton-nest:
		image: node:22
		container_name: studioos-granton-nest
		working_dir: /workspace/apps/granton-nest
		environment:
			DATABASE_URL: postgresql://studio:studio@postgres:5432/studioos
			JWT_SECRET: dev-secret
			PORT: 3000
		volumes:
			- ../:/workspace
		command: >
			sh -c "npm install && npm run db:generate && npm run db:migrate && npm run start:dev"
		ports:
			- "3000:3000"
		depends_on:
			postgres:
				condition: service_healthy

	whyne-python:
		image: python:3.10-slim
		container_name: studioos-whyne-python
		working_dir: /workspace/apps/whyne-python
		environment:
			FLASK_APP: app.main:create_app
			FLASK_RUN_HOST: 0.0.0.0
			FLASK_RUN_PORT: 5001
			DATABASE_URL: sqlite:////workspace/apps/whyne-python/app/instance/booking_dev.db
			PAYMENT_SERVICE_URL: http://shan-python:5002
			PROJECT_SERVICE_URL: http://granton-nest:3000
			DEFAULT_STUDIO_ID: ""
		volumes:
			- ../:/workspace
		command: >
			sh -c "pip install --no-cache-dir -r requirements.txt && flask run"
		ports:
			- "5001:5001"
		depends_on:
			granton-nest:
				condition: service_started
			shan-python:
				condition: service_started

	shan-python:
		image: python:3.10-slim
		container_name: studioos-shan-python
		working_dir: /workspace/apps/shan-python
		environment:
			FLASK_APP: app.main:app
			FLASK_RUN_HOST: 0.0.0.0
			FLASK_RUN_PORT: 5002
			MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
			MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
			MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
			MPESA_PASSKEY: ${MPESA_PASSKEY:-}
			MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-https://example.com/callback}
			MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}
		volumes:
			- ../:/workspace
		command: >
			sh -c "pip install --no-cache-dir -r requirements.txt && flask run"
		ports:
			- "5002:5002"

volumes:
	postgres_data:
